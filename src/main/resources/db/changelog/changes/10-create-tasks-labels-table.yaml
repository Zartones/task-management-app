databaseChangeLog:
  - changeSet:
      id: 10-create-tasks-labels-table
      author: zartones
      changes:
        - createTable:
            tableName: tasks_labels
            columns:
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: label_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: tasks_labels
            columnNames: task_id, label_id
            constraintName: pk_tasks_labels

        - addForeignKeyConstraint:
            baseTableName: tasks_labels
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk_tasks_labels_task
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: tasks_labels
            baseColumnNames: label_id
            referencedTableName: labels
            referencedColumnNames: id
            constraintName: fk_tasks_labels_label
            onDelete: CASCADE