- changeSet:
    id: 08-create-comments-table
    author: zartones
    changes:
      - createTable:
          tableName: comments
          columns:
            - column:
                name: id
                type: BIGINT
                autoIncrement: true
                constraints:
                  primaryKey: true
                  nullable: false

            - column:
                name: content
                type: TEXT
                constraints:
                  nullable: false

            - column:
                name: timestamp
                type: TIMESTAMP
                constraints:
                  nullable: false

            - column:
                name: task_id
                type: BIGINT
                constraints:
                  nullable: false

            - column:
                name: user_id
                type: BIGINT
                constraints:
                  nullable: false

      - addForeignKeyConstraint:
          baseTableName: comments
          baseColumnNames: task_id
          referencedTableName: tasks
          referencedColumnNames: id
          constraintName: fk_comments_task

      - addForeignKeyConstraint:
          baseTableName: comments
          baseColumnNames: user_id
          referencedTableName: users
          referencedColumnNames: id
          constraintName: fk_comments_user
