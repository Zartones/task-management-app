- changeSet:
    id: 07-create-labels-table
    author: zartones
    changes:
      - createTable:
          tableName: labels
          columns:
            - column:
                name: id
                type: BIGINT
                autoIncrement: true
                constraints:
                  primaryKey: true
                  nullable: false

            - column:
                name: name
                type: VARCHAR(255)
                constraints:
                  nullable: false

            - column:
                name: color
                type: VARCHAR(50)
                constraints:
                  nullable: false
